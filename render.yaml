services:
  - type: web
    name: contador-rpg-auditor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: UPLOAD_FOLDER
        value: /tmp/contador_uploads